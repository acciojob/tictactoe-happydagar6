<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Tic Tac Toe</h1>
        
        <div id="setup-section">
            <div class="input-group">
                <label for="player1">Player 1</label>
                <input type="text" id="player1" class="player-1" placeholder="enter name">
            </div>
            <div class="input-group">
                <label for="player2">Player 2</label>
                <input type="text" id="player2" class="player-2" placeholder="enter name">
            </div>
            <button id="submit">Start Game</button>
        </div>

        <div id="game-section" style="display: none;">
            <div class="message"></div>
            
            <div class="board" style="display: grid; grid-template-columns: repeat(3, 120px); grid-template-rows: repeat(3, 120px); width: 360px; height: 360px;">
                <div class="cell" id="1" style="width: 120px; height: 120px; border: 1px solid #000; display: flex; align-items: center; justify-content: center; font-size: 4rem; cursor: pointer;"></div>
                <div class="cell" id="2" style="width: 120px; height: 120px; border: 1px solid #000; display: flex; align-items: center; justify-content: center; font-size: 4rem; cursor: pointer;"></div>
                <div class="cell" id="3" style="width: 120px; height: 120px; border: 1px solid #000; display: flex; align-items: center; justify-content: center; font-size: 4rem; cursor: pointer;"></div>
                <div class="cell" id="4" style="width: 120px; height: 120px; border: 1px solid #000; display: flex; align-items: center; justify-content: center; font-size: 4rem; cursor: pointer;"></div>
                <div class="cell" id="5" style="width: 120px; height: 120px; border: 1px solid #000; display: flex; align-items: center; justify-content: center; font-size: 4rem; cursor: pointer;"></div>
                <div class="cell" id="6" style="width: 120px; height: 120px; border: 1px solid #000; display: flex; align-items: center; justify-content: center; font-size: 4rem; cursor: pointer;"></div>
                <div class="cell" id="7" style="width: 120px; height: 120px; border: 1px solid #000; display: flex; align-items: center; justify-content: center; font-size: 4rem; cursor: pointer;"></div>
                <div class="cell" id="8" style="width: 120px; height: 120px; border: 1px solid #000; display: flex; align-items: center; justify-content: center; font-size: 4rem; cursor: pointer;"></div>
                <div class="cell" id="9" style="width: 120px; height: 120px; border: 1px solid #000; display: flex; align-items: center; justify-content: center; font-size: 4rem; cursor: pointer;"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
